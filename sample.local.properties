## Copy this file to `local.properties` and fill in your values.
## This file must NOT be checked into version control.

# Android SDK path (auto-generated by Android Studio)
sdk.dir=D\:\\Android\\SDK

# AMap (高德地图) API Key
# Apply at: https://console.amap.com/dev/key/app
AMAP_API_KEY=YOUR_AMAP_API_KEY_HERE

# Release signing config (optional, for release builds only)
RELEASE_STORE_FILE=app/release.jks
RELEASE_STORE_PASSWORD=YOUR_STORE_PASSWORD
RELEASE_KEY_ALIAS=release
RELEASE_KEY_PASSWORD=YOUR_KEY_PASSWORD
