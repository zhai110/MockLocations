<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>虚拟定位 - 路线模拟原型</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background:#f5f5f5; overflow:hidden; height:100vh; }
.phone { width:390px; height:844px; margin:10px auto; border-radius:40px; overflow:hidden; border:8px solid #1a1a1a; position:relative; background:#e8e8e8; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
.screen { width:100%; height:100%; position:relative; overflow:hidden; }

/* 地图 */
.map { position:absolute; inset:0; background:linear-gradient(135deg,#e8eed5 0%,#d4debb 30%,#c8d4a8 60%,#bdd4a0 100%); }
.map-text { position:absolute; bottom:60%; left:20px; font-size:11px; color:#888; opacity:0.6; }
.map-road { position:absolute; }
.map-road.h { height:3px; background:#fff; opacity:0.5; }
.map-road.v { width:3px; background:#fff; opacity:0.5; }
.map-road.major { opacity:0.7; }
.map-label { position:absolute; font-size:9px; color:#666; white-space:nowrap; }

/* 路线 Polyline */
.route-line { position:absolute; z-index:5; pointer-events:none; }
.route-line svg { width:100%; height:100%; }

/* 标记点 */
.marker { position:absolute; z-index:10; transform:translate(-50%,-100%); }
.marker-dot { width:12px; height:12px; border-radius:50%; border:2px solid #fff; }
.marker-pin { width:30px; height:42px; position:relative; }
.marker-pin .head { width:20px; height:20px; border-radius:50%; background:#EA4335; border:3px solid #fff; margin:0 auto; box-shadow:0 2px 6px rgba(0,0,0,0.3); }
.marker-pin .tail { width:3px; height:16px; background:#EA4335; margin:0 auto; }
.marker-pin.blue .head { background:#4285F4; }
.marker-pin.blue .tail { background:#4285F4; }
.marker-pin.green .head { background:#34A853; }
.marker-pin.green .tail { background:#34A853; }
.route-point-label { position:absolute; top:-22px; left:50%; transform:translateX(-50%); font-size:10px; color:#fff; background:#34A853; padding:1px 6px; border-radius:8px; white-space:nowrap; }
.marker-moving { position:absolute; z-index:15; }
.marker-moving .head { background:#4285F4; animation: pulse-marker 1.5s ease-in-out infinite; }
@keyframes pulse-marker { 0%,100%{box-shadow:0 0 0 0 rgba(66,133,244,0.4)} 50%{box-shadow:0 0 0 8px rgba(66,133,244,0)} }

/* 搜索栏 */
.search-bar { position:absolute; top:50px; left:16px; right:16px; background:#fff; border-radius:16px; box-shadow:0 2px 8px rgba(0,0,0,0.1); padding:12px 16px; display:flex; align-items:center; z-index:20; }
.search-bar svg { width:20px; height:20px; fill:#999; margin-right:10px; flex-shrink:0; }
.search-bar input { border:none; outline:none; font-size:15px; width:100%; color:#333; background:transparent; }
.search-bar input::placeholder { color:#bbb; }

/* 右侧地图控制 */
.map-controls { position:absolute; right:14px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:6px; z-index:20; }
.map-btn { width:42px; height:42px; border-radius:12px; background:#fff; border:none; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,0.12); cursor:pointer; }
.map-btn svg { width:20px; height:20px; fill:#555; }
.map-btn.primary { background:#4A90D9; }
.map-btn.primary svg { fill:#fff; }

/* FAB */
.fab { position:absolute; bottom:152px; right:20px; width:56px; height:56px; border-radius:28px; background:#4A90D9; color:#fff; border:none; box-shadow:0 4px 12px rgba(74,144,217,0.4); display:flex; align-items:center; justify-content:center; z-index:20; cursor:pointer; transition:all 0.2s; font-size:14px; }
.fab:active { transform:scale(0.92); }
.fab svg { width:24px; height:24px; fill:#fff; }

/* BottomSheet */
.bottom-sheet { position:absolute; bottom:56px; left:0; right:0; background:#fff; border-radius:20px 20px 0 0; box-shadow:0 -2px 12px rgba(0,0,0,0.08); z-index:25; transition:transform 0.3s ease; }
.drag-handle { width:36px; height:4px; background:#ddd; border-radius:2px; margin:10px auto 0; }

/* 位置信息卡片 */
.location-card { margin:12px 16px; background:linear-gradient(135deg,#4A90D9,#357ABD); border-radius:16px; padding:18px; color:#fff; }
.location-card .title-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.location-card .title { font-size:13px; opacity:0.9; }
.status-badge { display:flex; align-items:center; gap:5px; background:rgba(255,255,255,0.2); border-radius:10px; padding:3px 8px; font-size:11px; }
.status-dot { width:6px; height:6px; border-radius:3px; background:#4CAF50; }
.status-dot.active { animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.coords-row { display:flex; gap:16px; margin-bottom:8px; }
.coord-item label { font-size:11px; opacity:0.7; display:block; }
.coord-item span { font-size:17px; font-weight:600; }
.address-row { display:flex; align-items:center; gap:6px; margin-top:10px; font-size:12px; opacity:0.9; }
.address-row svg { width:14px; height:14px; fill:#fff; flex-shrink:0; }
.address-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* 操作按钮组 */
.action-buttons { display:flex; gap:10px; padding:0 16px 12px; }
.action-btn { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 4px; border-radius:12px; cursor:pointer; transition:background 0.15s; }
.action-btn:active { background:#f0f0f0; }
.action-btn svg { width:22px; height:22px; fill:#4A90D9; }
.action-btn span { font-size:10px; color:#888; margin-top:4px; }
.action-btn.route-btn { position:relative; }
.action-btn.route-btn .new-dot { position:absolute; top:4px; right:12px; width:6px; height:6px; background:#EA4335; border-radius:3px; }

/* 路线控制栏 - 核心新增 */
.route-panel { margin:0 16px 12px; background:#f8f9fa; border-radius:14px; overflow:hidden; transition: max-height 0.3s ease, opacity 0.3s ease; }
.route-panel.collapsed { max-height:0; opacity:0; margin:0; padding:0; }
.route-panel.expanded { max-height:200px; opacity:1; }
.route-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; }
.route-header .label { font-size:13px; font-weight:600; color:#333; display:flex; align-items:center; gap:6px; }
.route-header .label svg { width:16px; height:16px; fill:#4A90D9; }
.route-header .count { font-size:12px; color:#999; }

/* 路线进度条 */
.route-progress { padding:0 14px; margin-bottom:8px; }
.progress-track { height:6px; background:#e0e0e0; border-radius:3px; position:relative; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#4A90D9,#357ABD); border-radius:3px; transition:width 0.3s; }
.progress-markers { display:flex; justify-content:space-between; margin-top:3px; }
.progress-mark { width:8px; height:8px; border-radius:50%; background:#4A90D9; border:2px solid #f8f9fa; transform:translateX(-50%); }
.progress-mark.active { background:#EA4335; box-shadow:0 0 0 3px rgba(234,67,53,0.2); }
.progress-labels { display:flex; justify-content:space-between; font-size:9px; color:#aaa; padding:0 4px; }

/* 路线控制按钮 */
.route-controls { display:flex; align-items:center; padding:6px 14px 12px; gap:8px; }
.route-play-btn { width:36px; height:36px; border-radius:18px; background:#4A90D9; color:#fff; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.route-play-btn svg { width:16px; height:16px; fill:#fff; }
.route-play-btn:active { background:#357ABD; }
.speed-chips { display:flex; gap:6px; flex:1; }
.speed-chip { padding:4px 10px; border-radius:12px; font-size:11px; font-weight:500; background:#e8e8e8; color:#666; border:none; cursor:pointer; transition:all 0.15s; }
.speed-chip.active { background:#4A90D9; color:#fff; }
.loop-btn { width:32px; height:32px; border-radius:16px; background:#e8e8e8; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.loop-btn svg { width:14px; height:14px; fill:#888; }
.loop-btn.active { background:#E8F5E9; }
.loop-btn.active svg { fill:#34A853; }
.route-clear-btn { width:32px; height:32px; border-radius:16px; background:#FFEBEE; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.route-clear-btn svg { width:14px; height:14px; fill:#EA4335; }

/* 底部导航 */
.bottom-nav { position:absolute; bottom:0; left:0; right:0; height:56px; background:#fff; display:flex; border-top:1px solid #eee; z-index:30; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; }
.nav-item svg { width:20px; height:20px; fill:#999; }
.nav-item span { font-size:10px; color:#999; }
.nav-item.active svg { fill:#4A90D9; }
.nav-item.active span { color:#4A90D9; }

/* 模式标签 */
.mode-tab { position:absolute; top:100px; left:50%; transform:translateX(-50%); display:flex; background:rgba(255,255,255,0.95); border-radius:20px; padding:3px; z-index:20; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.mode-tab button { padding:6px 16px; border:none; border-radius:17px; font-size:12px; font-weight:500; background:transparent; color:#888; cursor:pointer; transition:all 0.2s; }
.mode-tab button.active { background:#4A90D9; color:#fff; }

/* 提示浮层 */
.hint-toast { position:absolute; top:140px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.75); color:#fff; padding:8px 16px; border-radius:20px; font-size:12px; z-index:30; white-space:nowrap; opacity:0; transition:opacity 0.3s; }
.hint-toast.show { opacity:1; }
</style>
</head>
<body>

<div class="phone">
<div class="screen" id="screen">
  <!-- 地图 -->
  <div class="map" id="map" onclick="onMapClick(event)">
    <div class="map-road h major" style="top:35%;left:0;width:100%"></div>
    <div class="map-road h major" style="top:55%;left:0;width:100%"></div>
    <div class="map-road h" style="top:25%;left:20%;width:60%"></div>
    <div class="map-road h" style="top:65%;left:10%;width:80%"></div>
    <div class="map-road h" style="top:45%;left:5%;width:90%"></div>
    <div class="map-road v major" style="left:40%;top:0;height:100%"></div>
    <div class="map-road v major" style="left:65%;top:0;height:100%"></div>
    <div class="map-road v" style="left:25%;top:20%;height:60%"></div>
    <div class="map-road v" style="left:80%;top:15%;height:70%"></div>
    <div class="map-label" style="top:33%;left:42%">建国路</div>
    <div class="map-label" style="top:53%;left:42%">朝阳路</div>
    <div class="map-label" style="top:44%;left:26%">光华路</div>
    <div class="map-label" style="top:44%;left:66%">东三环</div>
    <div class="map-text">高德地图</div>
  </div>

  <!-- 路线折线 SVG -->
  <div class="route-line" id="routeLineOverlay" style="inset:0;position:absolute">
    <svg id="routeSvg" width="100%" height="100%"></svg>
  </div>

  <!-- 搜索栏 -->
  <div class="search-bar">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input placeholder="搜索地点" />
  </div>

  <!-- 模式切换标签 -->
  <div class="mode-tab">
    <button class="active" onclick="switchMode('point')">单点定位</button>
    <button onclick="switchMode('route')">路线模拟</button>
  </div>

  <!-- 提示 -->
  <div class="hint-toast" id="hintToast">点击地图添加路线点</div>

  <!-- 右侧地图控制 -->
  <div class="map-controls">
    <button class="map-btn"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
    <button class="map-btn"><svg viewBox="0 0 24 24"><path d="M5 11h14v2H5z"/></svg></button>
    <button class="map-btn primary"><svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0012 3C7.03 3 3 7.03 3 12c0 1.14.22 2.24.62 3.26L12 22l8.38-6.74c.4-1.02.62-2.12.62-3.26 0-4.97-4.03-9-9-9z"/></svg></button>
    <button class="map-btn"><svg viewBox="0 0 24 24"><path d="M11 17h2v-2h-2v2zm0-4h2V7h-2v6zm1-10C6.48 3 2 7.48 2 12s4.48 9 9 9 9-4.48 9-9-4.48-9-9-9z"/></svg></button>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="onFabClick()">
    <svg viewBox="0 0 24 24" id="fabIcon"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0012 3C7.03 3 3 7.03 3 12c0 1.14.22 2.24.62 3.26L12 22l8.38-6.74c.4-1.02.62-2.12.62-3.26 0-4.97-4.03-9-9-9z"/></svg>
  </button>

  <!-- BottomSheet -->
  <div class="bottom-sheet" id="bottomSheet">
    <div class="drag-handle"></div>

    <!-- 位置信息卡片 -->
    <div class="location-card">
      <div class="title-row">
        <span class="title">当前位置</span>
        <div class="status-badge">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">未模拟</span>
        </div>
      </div>
      <div class="coords-row">
        <div class="coord-item">
          <label>纬度</label>
          <span id="latText">39.9042°</span>
        </div>
        <div class="coord-item">
          <label>经度</label>
          <span id="lngText">116.4074°</span>
        </div>
      </div>
      <div class="address-row">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        <span class="address-text" id="addrText">点击地图选择位置</span>
      </div>
    </div>

    <!-- 操作按钮组 -->
    <div class="action-buttons">
      <div class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        <span>输入坐标</span>
      </div>
      <div class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.11L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9z"/></svg>
        <span>历史</span>
      </div>
      <div class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <span>收藏</span>
      </div>
      <div class="action-btn route-btn" id="routeActionBtn" onclick="switchMode('route')">
        <svg viewBox="0 0 24 24"><path d="M21 6l-2-2-6.5 6.5L10 8l-6 6 1.41 1.41L10 10.83l2.5 2.5L21 6z"/><path d="M3 18v2h18v-2H3z" opacity="0.5"/></svg>
        <span>路线</span>
        <div class="new-dot"></div>
      </div>
    </div>

    <!-- 路线控制栏 - 核心新增区域 -->
    <div class="route-panel collapsed" id="routePanel">
      <div class="route-header">
        <div class="label">
          <svg viewBox="0 0 24 24"><path d="M21 6l-2-2-6.5 6.5L10 8l-6 6 1.41 1.41L10 10.83l2.5 2.5L21 6z"/></svg>
          路线模拟
        </div>
        <span class="count" id="routePointCount">0 个点</span>
      </div>

      <!-- 进度条 -->
      <div class="route-progress" id="routeProgress">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="progress-labels">
          <span>起点</span>
          <span id="progressInfo">—</span>
          <span>终点</span>
        </div>
      </div>

      <!-- 控制按钮 -->
      <div class="route-controls">
        <button class="route-play-btn" id="playBtn" onclick="togglePlayback()">
          <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="speed-chips">
          <button class="speed-chip" onclick="setSpeed(0.5)">0.5x</button>
          <button class="speed-chip active" onclick="setSpeed(1)">1x</button>
          <button class="speed-chip" onclick="setSpeed(2)">2x</button>
          <button class="speed-chip" onclick="setSpeed(4)">4x</button>
        </div>
        <button class="loop-btn" id="loopBtn" onclick="toggleLoop()">
          <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
        <button class="route-clear-btn" onclick="clearRoute()">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.1V5l6 2.1v12z"/></svg>
      <span>地图</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.11L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9z"/></svg>
      <span>历史</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <span>收藏</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.9l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.2-1.13.53-1.62.9l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.9l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.2 1.13-.53 1.62-.9l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      <span>设置</span>
    </div>
  </div>

  <!-- 标记点容器 -->
  <div id="markersContainer"></div>
</div>
</div>

<script>
let mode = 'point'; // 'point' | 'route'
let routePoints = [];
let isPlaying = false;
let isLooping = false;
let currentPointIndex = 0;
let speedMultiplier = 1;
let playbackTimer = null;

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab button').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && m==='point') || (i===1 && m==='route'));
  });
  const panel = document.getElementById('routePanel');
  const hint = document.getElementById('hintToast');
  if (m === 'route') {
    panel.classList.remove('collapsed');
    panel.classList.add('expanded');
    hint.textContent = '点击地图添加路线点';
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 2500);
    // 隐藏单点标记
    document.querySelectorAll('.single-marker').forEach(el => el.style.display='none');
  } else {
    panel.classList.remove('expanded');
    panel.classList.add('collapsed');
    hint.classList.remove('show');
    stopPlayback();
    document.querySelectorAll('.single-marker').forEach(el => el.style.display='');
  }
}

function onMapClick(e) {
  const map = document.getElementById('map');
  const rect = map.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // 模拟坐标 (北京区域)
  const lat = 39.92 - (y / rect.height) * 0.06;
  const lng = 116.36 + (x / rect.width) * 0.08;

  if (mode === 'point') {
    addSingleMarker(x, y, lat, lng);
  } else {
    addRoutePoint(x, y, lat, lng);
  }
}

function addSingleMarker(x, y, lat, lng) {
  const container = document.getElementById('markersContainer');
  container.querySelectorAll('.single-marker').forEach(el => el.remove());
  const marker = document.createElement('div');
  marker.className = 'marker single-marker';
  marker.style.left = x + 'px';
  marker.style.top = y + 'px';
  marker.innerHTML = '<div class="marker-pin"><div class="head"></div><div class="tail"></div></div>';
  container.appendChild(marker);
  document.getElementById('latText').textContent = lat.toFixed(4) + '°';
  document.getElementById('lngText').textContent = lng.toFixed(4) + '°';
  document.getElementById('addrText').textContent = '朝阳区建国路' + Math.floor(Math.random()*200+1) + '号';
}

function addRoutePoint(x, y, lat, lng) {
  const idx = routePoints.length;
  routePoints.push({x, y, lat, lng});
  renderRoutePoints();
  updateRouteInfo();
}

function renderRoutePoints() {
  const container = document.getElementById('markersContainer');
  container.querySelectorAll('.route-marker,.route-moving').forEach(el => el.remove());
  
  // 绘制折线 SVG
  const svg = document.getElementById('routeSvg');
  svg.innerHTML = '';
  if (routePoints.length > 1) {
    let pathD = `M ${routePoints[0].x} ${routePoints[0].y}`;
    for (let i = 1; i < routePoints.length; i++) {
      pathD += ` L ${routePoints[i].x} ${routePoints[i].y}`;
    }
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', pathD);
    path.setAttribute('stroke', '#4A90D9');
    path.setAttribute('stroke-width', '4');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-dasharray', '8 4');
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path);
  }

  // 绘制标记点
  routePoints.forEach((p, i) => {
    const marker = document.createElement('div');
    marker.className = 'marker route-marker';
    marker.style.left = p.x + 'px';
    marker.style.top = p.y + 'px';
    const color = i === 0 ? 'green' : (i === routePoints.length-1 ? 'blue' : '');
    const label = i === 0 ? '起点' : (i === routePoints.length-1 ? '终点' : (i+1));
    marker.innerHTML = `<div class="marker-pin ${color}"><div class="head"></div><div class="tail"></div></div>
      <div class="route-point-label">${label}</div>`;
    container.appendChild(marker);
  });
}

function updateRouteInfo() {
  const count = document.getElementById('routePointCount');
  const progress = document.getElementById('progressInfo');
  count.textContent = routePoints.length + ' 个点';
  if (routePoints.length > 1) {
    progress.textContent = `0 / ${routePoints.length - 1} 段`;
  } else {
    progress.textContent = '—';
  }
  document.getElementById('progressFill').style.width = '0%';
}

function togglePlayback() {
  if (isPlaying) {
    stopPlayback();
  } else {
    startPlayback();
  }
}

function startPlayback() {
  if (routePoints.length < 2) {
    const hint = document.getElementById('hintToast');
    hint.textContent = '至少需要2个路线点';
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 2000);
    return;
  }
  isPlaying = true;
  currentPointIndex = 0;
  document.getElementById('playIcon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  document.getElementById('statusDot').classList.add('active');
  document.getElementById('statusText').textContent = '路线回放';
  
  playbackTimer = setInterval(() => {
    if (currentPointIndex >= routePoints.length - 1) {
      if (isLooping) {
        currentPointIndex = 0;
      } else {
        stopPlayback();
        return;
      }
    }
    currentPointIndex++;
    const p = routePoints[currentPointIndex];
    document.getElementById('latText').textContent = p.lat.toFixed(4) + '°';
    document.getElementById('lngText').textContent = p.lng.toFixed(4) + '°';
    // 更新进度
    const pct = (currentPointIndex / (routePoints.length - 1)) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressInfo').textContent = `${currentPointIndex} / ${routePoints.length - 1} 段`;
    // 移动蓝色标记
    updateMovingMarker(p);
  }, 1000 / speedMultiplier);
}

function stopPlayback() {
  isPlaying = false;
  if (playbackTimer) { clearInterval(playbackTimer); playbackTimer = null; }
  document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
  document.getElementById('statusDot').classList.remove('active');
  document.getElementById('statusText').textContent = '未模拟';
  document.querySelectorAll('.route-moving').forEach(el => el.remove());
}

function updateMovingMarker(p) {
  const container = document.getElementById('markersContainer');
  let moving = container.querySelector('.route-moving');
  if (!moving) {
    moving = document.createElement('div');
    moving.className = 'marker-moving marker route-moving';
    moving.innerHTML = '<div class="marker-pin blue"><div class="head"></div><div class="tail"></div></div>';
    container.appendChild(moving);
  }
  moving.style.left = p.x + 'px';
  moving.style.top = p.y + 'px';
}

function setSpeed(s) {
  speedMultiplier = s;
  document.querySelectorAll('.speed-chip').forEach(chip => {
    chip.classList.toggle('active', parseFloat(chip.textContent) === s);
  });
  if (isPlaying) { stopPlayback(); startPlayback(); }
}

function toggleLoop() {
  isLooping = !isLooping;
  document.getElementById('loopBtn').classList.toggle('active', isLooping);
}

function clearRoute() {
  stopPlayback();
  routePoints = [];
  currentPointIndex = 0;
  document.getElementById('markersContainer').querySelectorAll('.route-marker,.route-moving').forEach(el => el.remove());
  document.getElementById('routeSvg').innerHTML = '';
  updateRouteInfo();
}

function onFabClick() {
  if (mode === 'route' && routePoints.length >= 2 && !isPlaying) {
    startPlayback();
  }
}
</script>

</body>
</html>
